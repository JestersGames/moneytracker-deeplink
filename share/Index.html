<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

const playStoreUrl =
  "https://play.google.com/store/apps/details?id=com.jestersgames.moneytracker";

// se non c'è token, fallback
if (!token) {
  window.location.href = playStoreUrl;
}

// opzionale: redirect dopo qualche ms solo se browser
setTimeout(() => {
  window.location.href = playStoreUrl;
}, 1500);
</script>
